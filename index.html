<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reading Room</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 48px 24px;
      gap: 40px;
    }

    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; padding: 28px 16px; }
      .sidebar { border-left: none; border-top: 1px solid #1e1e1e; padding-left: 0; padding-top: 24px; }
    }

    /* ── LEFT MAIN ── */
    .main { display: flex; flex-direction: column; gap: 32px; }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
    }

    .source-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.1;
      color: #f0f0f0;
      transition: opacity .25s ease;
    }

    .source-desc {
      font-size: 15px;
      line-height: 1.7;
      color: #777;
      max-width: 480px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
      padding: 12px 22px;
      border-radius: 6px;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .btn-primary {
      background: #f0f0f0;
      color: #0a0a0a;
    }
    .btn-primary:hover { background: #fff; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: #888;
      border: 1px solid #222;
    }
    .btn-ghost:hover { border-color: #444; color: #ccc; transform: translateY(-1px); }
    .btn-ghost:active { transform: translateY(0); }

    .btn-saved {
      background: transparent;
      color: #f5c842;
      border: 1px solid #3a3010;
    }
    .btn-saved:hover { border-color: #f5c842; }

    .meta {
      font-size: 12px;
      color: #333;
      letter-spacing: .5px;
    }

    /* ── SAVED BANNER ── */
    .saved-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .saved-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 4px;
    }
    .saved-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      background: #111;
      border-radius: 6px;
      font-size: 13px;
      color: #aaa;
    }
    .saved-item a {
      color: #aaa;
      text-decoration: none;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .saved-item a:hover { color: #f0f0f0; }
    .saved-remove {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      transition: color .15s;
    }
    .saved-remove:hover { color: #888; }

    /* ── SIDEBAR ── */
    .sidebar {
      border-left: 1px solid #1a1a1a;
      padding-left: 32px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 10px;
    }

    .sidebar-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s ease;
      border: 1px solid transparent;
    }
    .sidebar-item:hover { background: #111; border-color: #1e1e1e; }
    .sidebar-item.active { background: #111; border-color: #2a2a2a; }

    .sidebar-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 3px;
    }
    .sidebar-item.active .sidebar-item-name { color: #f0f0f0; }

    .sidebar-item-desc {
      font-size: 11px;
      color: #444;
      line-height: 1.4;
    }

    /* ── PREVIEW PANE ── */
    .preview-section {
      margin-top: 8px;
    }
    .preview-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .preview-toggle-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
      cursor: pointer;
      user-select: none;
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #1e1e1e;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      transition: background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: #2a2a2a; border-color: #444; }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      background: #444;
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track .toggle-thumb {
      transform: translateX(16px);
      background: #f0f0f0;
    }

    .preview-wrap {
      position: relative;
      width: 100%;
      height: 260px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #1a1a1a;
      background: #0d0d0d;
    }
    .preview-wrap iframe {
      width: 100%; height: 100%; border: 0; display: block;
    }
    .preview-fallback {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #0d0d0d;
      color: #333;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
      text-align: center;
      padding: 24px;
    }
    .preview-fallback.show { display: flex; }
    .preview-fallback-icon { font-size: 32px; opacity: .4; }
    .preview-fallback-text { color: #444; font-size: 12px; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #2a2a2a;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Main -->
  <main class="main">
    <div>
      <div class="eyebrow" id="eyebrow">Up next</div>
    </div>

    <div>
      <h1 class="source-name" id="sourceName">—</h1>
    </div>

    <p class="source-desc" id="sourceDesc">—</p>

    <div class="actions">
      <button class="btn btn-primary" id="openBtn">Open →</button>
      <button class="btn btn-ghost"   id="nextBtn">Skip</button>
      <button class="btn btn-ghost"   id="saveBtn">☆ Save for later</button>
    </div>

    <div class="meta" id="meta">—</div>

    <!-- Preview pane -->
    <div class="preview-section">
      <div class="preview-toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="previewToggle"/>
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </label>
        <span class="preview-toggle-label">Preview</span>
      </div>
      <div id="previewPane" style="display:none">
        <div class="preview-wrap">
          <iframe id="previewFrame" title="Site preview"></iframe>
          <div class="preview-fallback" id="previewFallback">
            <div class="preview-fallback-icon">◻</div>
            <div class="preview-fallback-text">This site doesn't allow previews — hit Open to visit.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Saved list -->
    <div id="savedSection" style="display:none">
      <div class="saved-label">Saved for later</div>
      <div class="saved-list" id="savedList"></div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">All sources</div>
    <div id="sidebarList"></div>
  </aside>
</div>

<footer>reading room · stay curious</footer>

<script>
  const sources = [
    { name: "Good News Network",           url: "https://www.goodnewsnetwork.org/",                   desc: "Uplifting stories and positive headlines." },
    { name: "Atlas Obscura",               url: "https://www.atlasobscura.com/",                      desc: "Strange places and curious history." },
    { name: "The Marginalian",             url: "https://www.themarginalian.org/",                    desc: "Art, science, philosophy, and life." },
    { name: "Aeon",                        url: "https://aeon.co/",                                   desc: "Big ideas in philosophy and culture." },
    { name: "Nautilus",                    url: "https://nautil.us/",                                 desc: "Science meets story." },
    { name: "Farnam Street",               url: "https://fs.blog/",                                   desc: "Mental models and better thinking." },
    { name: "The Pudding",                 url: "https://pudding.cool/",                              desc: "Data-driven visual essays." },
    { name: "The Millions",                url: "https://themillions.com/",                           desc: "Books and literary culture." },
    { name: "Reddit: InternetIsBeautiful", url: "https://www.reddit.com/r/InternetIsBeautiful/",      desc: "Interesting corners of the web." }
  ];

  const LS = { bag: "rr_bag2", bagDate: "rr_bagDate2", saved: "rr_saved2", todayDate: "rr_td2", todayCount: "rr_tc2", preview: "rr_preview2" };
  let current = null;
  let fallbackTimer = null;

  // ── Bag (non-repeating shuffle) ──
  function todayKey() { return new Date().toDateString(); }

  function getBag() {
    let bag = [];
    try { bag = JSON.parse(localStorage.getItem(LS.bag) || "[]"); } catch(e) { bag = []; }
    if (localStorage.getItem(LS.bagDate) !== todayKey() || !Array.isArray(bag) || bag.length === 0) {
      const idx = sources.map((_, i) => i);
      for (let i = idx.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [idx[i], idx[j]] = [idx[j], idx[i]];
      }
      bag = idx;
      localStorage.setItem(LS.bag, JSON.stringify(bag));
      localStorage.setItem(LS.bagDate, todayKey());
    }
    return bag;
  }

  function popFromBag() {
    const bag = getBag();
    const idx = bag.pop();
    localStorage.setItem(LS.bag, JSON.stringify(bag));
    return sources[idx !== undefined ? idx : 0];
  }

  // ── Today count ──
  function getTodayCount() {
    if (localStorage.getItem(LS.todayDate) !== todayKey()) {
      localStorage.setItem(LS.todayDate, todayKey());
      localStorage.setItem(LS.todayCount, "0");
    }
    return parseInt(localStorage.getItem(LS.todayCount) || "0", 10);
  }
  function incTodayCount() {
    localStorage.setItem(LS.todayCount, String(getTodayCount() + 1));
  }

  // ── Saved ──
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(LS.saved) || "[]"); } catch(e) { return []; }
  }
  function setSaved(arr) { localStorage.setItem(LS.saved, JSON.stringify(arr)); }

  function saveForLater(source) {
    const saved = getSaved();
    if (!saved.find(s => s.url === source.url)) {
      saved.push({ name: source.name, url: source.url });
      setSaved(saved);
    }
    renderSaved();
    const btn = document.getElementById("saveBtn");
    btn.textContent = "★ Saved!";
    btn.classList.add("btn-saved");
    setTimeout(() => {
      btn.textContent = "☆ Save for later";
      btn.classList.remove("btn-saved");
    }, 1500);
  }

  function removeSaved(url) {
    setSaved(getSaved().filter(s => s.url !== url));
    renderSaved();
  }

  function renderSaved() {
    const saved = getSaved();
    const section = document.getElementById("savedSection");
    const list = document.getElementById("savedList");
    if (saved.length === 0) { section.style.display = "none"; return; }
    section.style.display = "block";
    list.innerHTML = "";
    saved.forEach(s => {
      const div = document.createElement("div");
      div.className = "saved-item";
      div.innerHTML =
        '<a href="' + s.url + '" target="_blank">' + s.name + '</a>' +
        '<button class="saved-remove" title="Remove">×</button>';
      div.querySelector(".saved-remove").addEventListener("click", () => removeSaved(s.url));
      list.appendChild(div);
    });
  }

  // ── Preview ──
  function getPreviewOn() { return localStorage.getItem(LS.preview) === "1"; }
  function setPreviewOn(on) {
    localStorage.setItem(LS.preview, on ? "1" : "0");
    document.getElementById("previewToggle").checked = on;
    document.getElementById("previewPane").style.display = on ? "block" : "none";
    if (on && current) loadPreview(current.url, current.name);
    else {
      document.getElementById("previewFrame").src = "about:blank";
      hideFallback();
    }
  }

  function hideFallback() { document.getElementById("previewFallback").classList.remove("show"); }
  function showFallback() { document.getElementById("previewFallback").classList.add("show"); }

  function loadPreview(url, name) {
    hideFallback();
    if (fallbackTimer) clearTimeout(fallbackTimer);
    const frame = document.getElementById("previewFrame");
    frame.src = "about:blank";
    setTimeout(function() {
      frame.src = url;
      fallbackTimer = setTimeout(function() {
        try {
          const loc = frame.contentWindow.location.href;
          if (!loc || loc === "about:blank") showFallback();
        } catch(e) { /* cross-origin = loaded fine */ }
      }, 3000);
    }, 50);
  }

  document.getElementById("previewFrame").addEventListener("load", function() {
    if (fallbackTimer) clearTimeout(fallbackTimer);
    try {
      const loc = document.getElementById("previewFrame").contentWindow.location.href;
      if (!loc || loc === "about:blank") showFallback();
      else hideFallback();
    } catch(e) { hideFallback(); }
  });

  document.getElementById("previewToggle").addEventListener("change", function(e) {
    setPreviewOn(e.target.checked);
  });

  // ── Set current source ──
  function setCurrent(source) {
    current = source;
    document.getElementById("sourceName").textContent = source.name;
    document.getElementById("sourceDesc").textContent = source.desc;
    document.getElementById("meta").textContent =
      "Today: " + getTodayCount() + " opened  ·  " + todayKey();
    renderSidebar();
    if (getPreviewOn()) loadPreview(source.url, source.name);
  }

  // ── Sidebar ──
  function renderSidebar() {
    const container = document.getElementById("sidebarList");
    container.innerHTML = "";
    sources.forEach(s => {
      const div = document.createElement("div");
      div.className = "sidebar-item" + (s === current ? " active" : "");
      div.innerHTML =
        '<div class="sidebar-item-name">' + s.name + '</div>' +
        '<div class="sidebar-item-desc">' + s.desc + '</div>';
      div.addEventListener("click", () => setCurrent(s));
      container.appendChild(div);
    });
  }

  // ── Buttons ──
  document.getElementById("openBtn").addEventListener("click", () => {
    if (!current) return;
    incTodayCount();
    window.location.href = current.url;
  });

  document.getElementById("nextBtn").addEventListener("click", () => {
    setCurrent(popFromBag());
  });

  document.getElementById("saveBtn").addEventListener("click", () => {
    if (current) saveForLater(current);
  });

  // ── Keyboard shortcuts ──
  document.addEventListener("keydown", e => {
    const tag = (e.target && e.target.tagName || "").toLowerCase();
    if (tag === "input" || tag === "textarea") return;
    if (e.key.toLowerCase() === "o" && current) { incTodayCount(); window.location.href = current.url; }
    if (e.key.toLowerCase() === "n") setCurrent(popFromBag());
    if (e.key.toLowerCase() === "s" && current) saveForLater(current);
  });

  // ── Init ──
  
  renderSaved();
  setCurrent(popFromBag());
</script>
</body>
</html>
